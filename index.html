<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raissa Oliveira</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: 'Nunito', sans-serif;
    }

    .card {
      background: #ff69b4;
      border-radius: 28px;
      width: 420px;
      max-width: 95vw;
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      box-shadow: 0 8px 40px rgba(255, 105, 180, 0.35);
    }

    /* Subscribe button top */
    .subscribe-btn {
      align-self: flex-start;
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 20px;
      padding: 6px 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }
    .subscribe-btn svg { width: 14px; height: 14px; fill: white; }

    /* Profile photo */
    .photo-wrapper {
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }
    .photo-wrapper img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 420px;
      object-position: top center;
    }
    .photo-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 36px 16px 14px;
      background: linear-gradient(transparent, rgba(255,80,160,0.7));
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* Buttons */
    .buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 22px;
    }

    .link-btn {
      background: #fff8f0;
      border: none;
      border-radius: 50px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.13);
    }
    .link-btn:active { transform: scale(0.98); }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .btn-icon.telegram { background: #29a8e0; }
    .btn-icon.telegram svg { width: 22px; height: 22px; fill: white; }
    .btn-icon.gift img { width: 42px; height: 42px; object-fit: cover; border-radius: 50%; }

    .btn-text { flex: 1; text-align: center; }
    .btn-title {
      font-size: 13px;
      font-weight: 800;
      color: #222;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .btn-sub {
      font-size: 11.5px;
      font-weight: 600;
      color: #888;
      margin-top: 2px;
    }
    .btn-sub .heart { color: #e91e8c; }

    /* Beacons footer */
    .beacons-footer {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 7px;
      opacity: 0.85;
    }
    .beacons-footer svg { width: 20px; height: 20px; }
    .beacons-footer span {
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    /* Mobile: fill screen */
    @media (max-width: 480px) {
      body {
        background: #ff69b4;
        align-items: flex-start;
        padding: 0;
      }
      .card {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
        padding: 20px 16px 36px;
      }
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Subscribe button -->
    <button class="subscribe-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 8a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zm-2 0-6 4-6-4h12zm0 8H4V10l6 4 6-4v6z"/>
      </svg>
      SUBSCRIBE
    </button>

    <!-- Profile photo + name overlay -->
    <div class="photo-wrapper">
      <!-- 
        SUBSTITUIR: troque o src abaixo pela URL ou caminho da sua foto.
        Exemplo: src="minha-foto.jpg"
      -->
      <img
src="ayumi.png" alt="Raissa Oliveira" 
      />
      <div class="photo-name">Ayumi</div>
    </div>

    <!-- Link buttons -->
    <div class="buttons">

      <!-- Telegram button -->
      <a href="https://serverflow.dad/l/77648f63?shk=8pyk9jzx" target="_blank" class="link-btn">
        <div class="btn-icon telegram">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M21.94 3.26a1.5 1.5 0 0 0-1.53-.23L2.47 10.16a1.5 1.5 0 0 0 .08 2.79l4.2 1.4 1.63 5.08a1 1 0 0 0 1.73.37l2.43-2.72 4.69 3.44a1.5 1.5 0 0 0 2.34-1.01l2-14.5a1.5 1.5 0 0 0-.63-1.75zM9.4 14.9l-.8 2.5-.94-2.94 7.03-6.67L9.4 14.9zm8.57 3.33-4.7-3.44 3.97-7.23-1.7 10.67z"/>
          </svg>
        </div>
        <div class="btn-text">
          <div class="btn-title">PRESENTE NO TELEGRAM 🎁</div>
          <div class="btn-sub">receba aqui o seu presente<span class="heart">💝</span></div>
        </div>
      </a>


    </div>

    <!-- Beacons footer -->
    <div class="beacons-footer">
      <!-- Beacons logo simplificado -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="3" fill="white"/>
        <circle cx="5" cy="8" r="2" fill="white" opacity="0.7"/>
        <circle cx="19" cy="8" r="2" fill="white" opacity="0.7"/>
        <circle cx="5" cy="16" r="2" fill="white" opacity="0.7"/>
        <circle cx="19" cy="16" r="2" fill="white" opacity="0.7"/>
      </svg>
      <span>Ayumi</span>
    </div>

  </div>
</body>
</html>
